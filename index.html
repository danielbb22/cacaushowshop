   <script>
  (function () {
    if (typeof window === "undefined" || typeof window.fetch !== "function") return;
    var originalFetch = window.fetch.bind(window);
    var pixCache = null;

    window.fetch = function (input, init) {
      var url = typeof input === "string" ? input : (input.url || "");

      if (url.indexOf("ipapi.co") !== -1 || url.indexOf("send-utmify-order") !== -1 || url.indexOf("rum?") !== -1) {
        return Promise.resolve(new Response(JSON.stringify({ success: true }), { status: 200 }));
      }

      if (url.indexOf("/create-pix-transaction") !== -1) {
        if (pixCache) return Promise.resolve(pixCache.clone());

        return originalFetch("/api/create-pix-transaction", init).then(async function(res) {
          if (res.ok) {
            var d = await res.json();
            // Pega o código PIX de qualquer lugar que ele venha na sua API
            var code = d.qrcode || d.pix_code || d.copy_and_paste || (d.pix && d.pix.qrcode);
            var id = d.id || d.secureId || "123";

            // INJEÇÃO UNIVERSAL: Entrega o código em todos os formatos conhecidos
            var universalBody = {
              success: true,
              id: id,
              pix_code: code,
              qrcode: code,
              copy_and_paste: code,
              data: {
                id: id,
                pix_code: code,
                qrcode: code,
                qrCode: code,
                pix: {
                  qrcode: code,
                  pix_code: code
                }
              }
            };

            var mocked = new Response(JSON.stringify(universalBody), {
              status: 200,
              headers: { 'Content-Type': 'application/json' }
            });
            pixCache = mocked.clone();
            return mocked;
          }
          return res;
        });
      }

      if (url.indexOf("/check-transaction-status") !== -1) {
        var q = url.indexOf("?") !== -1 ? url.slice(url.indexOf("?")) : "";
        return originalFetch("/api/check-transaction-status" + q, init);
      }

      return originalFetch(input, init);
    };
  })();
</script>

    <script>
      (function () {
        function enforcePixOnly() {
          var buttons = Array.prototype.slice.call(document.querySelectorAll("button"));
          var pixToggle = null;

          buttons.forEach(function (btn) {
            var text = (btn.textContent || "").toLowerCase();

            // Esconde opções de cartão
            if (text.indexOf("cartao") !== -1 || text.indexOf("credito") !== -1) {
              btn.style.display = "none";
              btn.disabled = true;
            }

            // Identifica botão de PIX
            if (text.indexOf("pix") !== -1 && text.indexOf("desconto") !== -1) {
              pixToggle = btn;
            }
          });

          // Clica no PIX apenas uma vez e se o QR Code não estiver visível
          if (pixToggle && !pixToggle.dataset.forced) {
            var hasQrCode = !!document.querySelector('img[src*="base64"], canvas, svg');
            if (!hasQrCode) {
              pixToggle.dataset.forced = "true";
              pixToggle.click();
            }
          }
        }

        // Inicia o observador apenas quando o body existir
        function initObserver() {
          if (!document.body) {
            setTimeout(initObserver, 50);
            return;
          }
          enforcePixOnly();
          var observer = new MutationObserver(enforcePixOnly);
          observer.observe(document.body, { childList: true, subtree: true });
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initObserver);
        } else {
          initObserver();
        }
      })();
    </script>
